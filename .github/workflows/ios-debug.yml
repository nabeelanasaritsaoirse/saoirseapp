name: 🍎 iOS Native Debug (Black Screen)

on:
  push:
    branches:
      - DEPLOY

jobs:
  ios-native-debug:
    runs-on: macos-14

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Flutter
      # --------------------------------------------------
      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      # --------------------------------------------------
      # Flutter clean
      # --------------------------------------------------
      - name: 🧹 Flutter clean
        run: flutter clean

      # --------------------------------------------------
      # Pub get (MUST be before pod install)
      # --------------------------------------------------
      - name: 📦 Flutter pub get
        run: flutter pub get

      # --------------------------------------------------
      # Generate iOS config files (CRITICAL STEP)
      # This creates ios/Flutter/Generated.xcconfig
      # --------------------------------------------------
      - name: 🛠️ Generate iOS build files
        run: flutter build ios --debug --simulator --no-codesign

      # --------------------------------------------------
      # CocoaPods (NOW it will work)
      # --------------------------------------------------
      - name: 📦 Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      # --------------------------------------------------
      # Native Xcode build (to expose crash)
      # --------------------------------------------------
      - name: 🔍 Native Xcode build (verbose)
        run: |
          set -o pipefail
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      # --------------------------------------------------
      # Upload logs
      # --------------------------------------------------
      - name: 📄 Upload native logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-debug-logs
          path: |
            ios/xcodebuild.log
            ~/Library/Logs/DiagnosticReports
