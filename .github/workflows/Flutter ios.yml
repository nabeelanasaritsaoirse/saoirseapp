name: 🍎 iOS CI & TestFlight
run-name: "🚀 iOS Build by ${{ github.actor }} on ${{ github.ref_name }}"

on:
  push:
    branches:
      - tes

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  BUNDLE_ID: com.saoirse.epi
  TEAM_ID: BYQUNNQSQH
  PROFILE_NAME: "match AppStore com.saoirse.epi 1765456537"
  ARCHIVE_DIR: build/ios/archive
  IPA_DIR: build/ios/ipa

jobs:
  ios-ci:
    runs-on: macos-15
    outputs:
      version_name: ${{ steps.version.outputs.VERSION_NAME }}
      build_number: ${{ steps.version.outputs.BUILD_NUMBER }}

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Xcode preparation
      # --------------------------------------------------
      - name: 🛠 Prepare Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -runFirstLaunch || true

      # --------------------------------------------------
      # Flutter
      # --------------------------------------------------
      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # --------------------------------------------------
      # Ruby tools
      # --------------------------------------------------
      - name: 🚀 Install Fastlane & CocoaPods
        run: |
          sudo gem install fastlane -N
          sudo gem install cocoapods -N

      # --------------------------------------------------
      # Clean
      # --------------------------------------------------
      - name: 🧹 Flutter Clean
        run: flutter clean

      # --------------------------------------------------
      # Dependencies
      # --------------------------------------------------
      - name: 📦 Flutter Pub Get
        run: flutter pub get

      # --------------------------------------------------
      # ✅ NEW: Create .env file (FIXES ASSET BUNDLING)
      # --------------------------------------------------
      - name: 📝 Create .env file
        run: |
          echo "Creating .env file..."
          cat > .env <<EOF
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          IOS_API_KEY=${{ secrets.IOS_API_KEY }}
          IOS_APP_ID=${{ secrets.IOS_APP_ID }}
          IOS_MESSAGING_SENDER_ID=${{ secrets.IOS_MESSAGING_SENDER_ID }}
          IOS_PROJECT_ID=${{ secrets.IOS_PROJECT_ID }}
          ANDROID_API_KEY=${{ secrets.ANDROID_API_KEY }}
          ANDROID_APP_ID=${{ secrets.ANDROID_APP_ID }}
          ANDROID_MESSAGING_SENDER_ID=${{ secrets.ANDROID_MESSAGING_SENDER_ID }}
          ANDROID_PROJECT_ID=${{ secrets.ANDROID_PROJECT_ID }}
          EOF
          echo "✅ .env file created"

      # --------------------------------------------------
      # ✅ NEW: Download Poppins Fonts (FIXES FONT ERRORS)
      # --------------------------------------------------
      - name: 📥 Download Poppins Fonts for iOS
        run: |
          echo "Downloading Poppins fonts..."
          mkdir -p assets/fonts
          cd assets/fonts
          
          curl -L -o Poppins-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Regular.ttf"
          curl -L -o Poppins-Medium.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Medium.ttf"
          curl -L -o Poppins-SemiBold.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-SemiBold.ttf"
          curl -L -o Poppins-Bold.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf"
          
          echo "✅ Fonts downloaded successfully:"
          ls -lh
          
          # Verify fonts were downloaded
          if [ ! -f "Poppins-Regular.ttf" ]; then
            echo "❌ Font download failed"
            exit 1
          fi
          
          echo "✅ All Poppins fonts ready"
          cd ../..

      # --------------------------------------------------
      # ✅ NEW: Fix CocoaPods Configuration (ELIMINATES WARNINGS)
      # --------------------------------------------------
      - name: 🔧 Fix CocoaPods Configuration
        run: |
          echo "Fixing CocoaPods configuration..."
          
          for config in Debug Profile Release; do
            xcconfig_file="ios/Flutter/${config}.xcconfig"
            if [ -f "$xcconfig_file" ]; then
              if ! grep -q "Pods-Runner.${config,,}.xcconfig" "$xcconfig_file"; then
                echo "#include \"Pods/Target Support Files/Pods-Runner/Pods-Runner.${config,,}.xcconfig\"" >> "$xcconfig_file"
                echo "✅ Added CocoaPods config to ${config}.xcconfig"
              else
                echo "ℹ️  ${config}.xcconfig already includes CocoaPods config"
              fi
            fi
          done

          
          
          echo "✅ CocoaPods configuration fixed"

      # --------------------------------------------------
      # Version
      # --------------------------------------------------
      - name: 🔢 Read Version from pubspec.yaml
        id: version
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | cut -d '+' -f 1 | sed 's/version: //')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | cut -d '+' -f 2)
          
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER=$GITHUB_RUN_NUMBER
          fi
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION_NAME ($BUILD_NUMBER)"

      # --------------------------------------------------
      # Fix Launch Screen Assets
      # --------------------------------------------------
      - name: 🖼️ Verify Launch Screen Assets
        run: |
          echo "Checking LaunchImage.imageset configuration..."
          
          if [ ! -d "ios/Runner/Assets.xcassets/LaunchImage.imageset" ]; then
            echo "⚠️  LaunchImage.imageset not found! Creating it..."
            mkdir -p ios/Runner/Assets.xcassets/LaunchImage.imageset
          fi
          
          cat > ios/Runner/Assets.xcassets/LaunchImage.imageset/Contents.json <<'JSON'
          {
            "images" : [
              {
                "idiom" : "universal",
                "filename" : "LaunchImage.png",
                "scale" : "1x"
              },
              {
                "idiom" : "universal",
                "filename" : "LaunchImage@2x.png",
                "scale" : "2x"
              },
              {
                "idiom" : "universal",
                "filename" : "LaunchImage@3x.png",
                "scale" : "3x"
              }
            ],
            "info" : {
              "version" : 1,
              "author" : "xcode"
            }
          }
          JSON
          
          echo "✅ LaunchImage.imageset configuration verified"

      # --------------------------------------------------
      # CRITICAL: Fix iOS Black Screen Issues
      # --------------------------------------------------
      - name: 🔧 Fix iOS Black Screen Configuration
        run: |
          echo "=== Applying iOS Black Screen Fixes ==="
          
          # 1. Remove UIApplicationSceneManifest
          echo "1. Removing UIApplicationSceneManifest if present..."
          /usr/libexec/PlistBuddy -c "Delete :UIApplicationSceneManifest" ios/Runner/Info.plist 2>/dev/null || echo "   No scene manifest found (good)"
          
          # 2. Verify removal
          if /usr/libexec/PlistBuddy -c "Print :UIApplicationSceneManifest" ios/Runner/Info.plist 2>&1 | grep -q "Does Not Exist"; then
            echo "   ✅ Verified: UIApplicationSceneManifest removed"
          fi
          
          # 3. Note: Podfile already has Swift 5.0 and iOS 13.0 configured
          echo "2. iOS deployment target already set to 13.0 in Podfile ✅"
          
          # 4. Set deployment target in project.pbxproj
          if [ -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
            echo "   ✅ project.pbxproj updated"
          fi
          
          # 5. Configure Release.xcconfig
          echo "3. Configuring Release.xcconfig..."
          cat >> ios/Flutter/Release.xcconfig <<XCCONFIG
          // ===== BLACK SCREEN FIX =====
          // Prevent symbol stripping that breaks Flutter FFI
          STRIP_STYLE = non-global
          DEAD_CODE_STRIPPING = YES
          IPHONEOS_DEPLOYMENT_TARGET = 13.0
          // Additional optimization settings
          ENABLE_BITCODE = NO
          ONLY_ACTIVE_ARCH = NO
          XCCONFIG
          
          echo "   ✅ Release.xcconfig updated"
          echo ""
          echo "✅ All black screen fixes applied successfully"

      # --------------------------------------------------
      # Update Info.plist
      # --------------------------------------------------
      - name: 📝 Update Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Add :io.flutter.embedded_views_preview bool true" ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :io.flutter.embedded_views_preview true" ios/Runner/Info.plist
          
          /usr/libexec/PlistBuddy -c "Add :CADisableMinimumFrameDurationOnPhone bool true" ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CADisableMinimumFrameDurationOnPhone true" ios/Runner/Info.plist
          
          echo "✅ Info.plist updated with required keys"

      # --------------------------------------------------
      # App Store Connect API key
      # --------------------------------------------------
      - name: 🔐 Write App Store Connect API Key
        run: |
          mkdir -p ios
          echo '${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BUILD }}' > ios/api_key.json
          chmod 600 ios/api_key.json

      # --------------------------------------------------
      # Keychain
      # --------------------------------------------------
      - name: 🔓 Setup Keychain
        run: |
          KEYCHAIN_PASSWORD="ci_keychain_pass"
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          
          security delete-keychain build.keychain-db 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security default-keychain -s build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security set-keychain-settings -lut 7200 build.keychain-db
          security list-keychains -d user -s build.keychain-db $(security list-keychains -d user | sed s/\"//g)
          
          echo "✅ Keychain setup complete"
          security list-keychains

      # --------------------------------------------------
      # Certificates
      # --------------------------------------------------
      - name: 🔐 Fastlane Match
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          fastlane match appstore \
            --readonly \
            --api_key_path ./api_key.json \
            --git_url https://github.com/nabeelanasaritsaoirse/ios-certificates.git \
            --git_branch main \
            --keychain_name build.keychain-db \
            --keychain_password "ci_keychain_pass"
          
          echo "✅ Certificates installed"
          echo "Checking for Apple Distribution certificate..."
          security find-identity -v -p codesigning build.keychain-db | grep "Apple Distribution" || echo "⚠️  No distribution cert found!"

      # --------------------------------------------------
      # Firebase Config
      # --------------------------------------------------
      - name: 🔥 Add GoogleService-Info.plist
        run: |
          cat > ios/Runner/GoogleService-Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>${{ secrets.IOS_API_KEY }}</string>
            <key>GCM_SENDER_ID</key>
            <string>${{ secrets.IOS_MESSAGING_SENDER_ID }}</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>com.saoirse.epi</string>
            <key>PROJECT_ID</key>
            <string>${{ secrets.IOS_PROJECT_ID }}</string>
            <key>STORAGE_BUCKET</key>
            <string>saoirse-epi.firebasestorage.app</string>
            <key>IS_ADS_ENABLED</key>
            <false></false>
            <key>IS_ANALYTICS_ENABLED</key>
            <false></false>
            <key>IS_APPINVITE_ENABLED</key>
            <true></true>
            <key>IS_GCM_ENABLED</key>
            <true></true>
            <key>IS_SIGNIN_ENABLED</key>
            <true></true>
            <key>GOOGLE_APP_ID</key>
            <string>${{ secrets.IOS_APP_ID }}</string>
            <key>CLIENT_ID</key>
            <string>486829564070-c6hh2o5qd20omheki4qlkkhhg4u4625q.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>com.googleusercontent.apps.486829564070-c6hh2o5qd20omheki4qlkkhhg4u4625q</string>
            <key>ANDROID_CLIENT_ID</key>
            <string>486829564070-4d1fkup9ndsfec17mg830p1p7eqd6469.apps.googleusercontent.com</string>
          </dict>
          </plist>
          EOF

      # --------------------------------------------------
      # ✅ Pods (Podfile already has Swift 5.0 configured)
      # --------------------------------------------------
      - name: 📦 Install Pods
        run: |
          cd ios
          pod install --repo-update
          echo "✅ Pods installed with Swift 5.0 configuration"

      # --------------------------------------------------
      # Configure Xcode project
      # --------------------------------------------------
      - name: ⚙️ Configure Xcode Project Signing
        run: |
          sudo gem install xcodeproj -N
          
          cat > update_signing.rb <<'RUBY'
          require 'xcodeproj'
          
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          project.targets.each do |target|
            if target.name == 'Runner'
              target.build_configurations.each do |config|
                if config.name == 'Release'
                  config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                  config.build_settings['DEVELOPMENT_TEAM'] = ENV['TEAM_ID']
                  config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                  config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ENV['PROFILE_NAME']
                  config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                  config.build_settings['ENABLE_BITCODE'] = 'NO'
                  config.build_settings['ONLY_ACTIVE_ARCH'] = 'NO'
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                end
              end
            end
          end
          
          project.save
          puts "✅ Xcode project configured"
          RUBY
          
          ruby update_signing.rb

      # --------------------------------------------------
      # Verify Flutter Environment
      # --------------------------------------------------
      - name: 🩺 Verify Flutter Environment
        run: flutter doctor -v

      # --------------------------------------------------
      # Build Flutter
      # --------------------------------------------------
      - name: 🔨 Build Flutter Framework
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name ${{ steps.version.outputs.VERSION_NAME }} \
            --build-number ${{ steps.version.outputs.BUILD_NUMBER }}

      # --------------------------------------------------
      # ExportOptions
      # --------------------------------------------------
      - name: 📝 Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${{ env.PROFILE_NAME }}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      # --------------------------------------------------
      # Archive with Xcode
      # --------------------------------------------------
      - name: 🏗️ Archive with Xcode
        run: |
          cd ios
          mkdir -p ../${{ env.ARCHIVE_DIR }}
          mkdir -p ../${{ env.IPA_DIR }}
          
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../${{ env.ARCHIVE_DIR }}/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM=${{ env.TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            STRIP_STYLE=non-global \
            DEAD_CODE_STRIPPING=YES \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            ENABLE_BITCODE=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db" \
            | tee ../archive.log
          
          echo "✅ Archive created with black screen fixes"

      # --------------------------------------------------
      # Verify Build Settings
      # --------------------------------------------------
      - name: 🔍 Verify Build Settings
        run: |
          echo "=== Verifying Critical Build Settings ==="
          cd ios
          xcodebuild -showBuildSettings \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release | grep -E "(STRIP_STYLE|IPHONEOS_DEPLOYMENT_TARGET|DEAD_CODE_STRIPPING|SWIFT_VERSION)" || echo "Settings not found"

      # --------------------------------------------------
      # Verify Archive
      # --------------------------------------------------
      - name: 🔍 Verify Archive Structure
        run: |
          echo "=== Archive Structure ==="
          ls -la ${{ env.ARCHIVE_DIR }}/Runner.xcarchive/Products/Applications/
          echo ""
          echo "=== App Contents ==="
          ls -la ${{ env.ARCHIVE_DIR }}/Runner.xcarchive/Products/Applications/Runner.app/
          echo ""
          echo "=== Flutter Frameworks ==="
          ls -la ${{ env.ARCHIVE_DIR }}/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/ | grep -E "(App.framework|Flutter.framework)" || echo "⚠️  Flutter frameworks missing!"

      # --------------------------------------------------
      # Export IPA
      # --------------------------------------------------
      - name: 📦 Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath ../${{ env.ARCHIVE_DIR }}/Runner.xcarchive \
            -exportPath ../${{ env.IPA_DIR }} \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            | tee ../export.log
          
          echo "✅ IPA exported"
          ls -lh ../${{ env.IPA_DIR }}/

      # --------------------------------------------------
      # Verify IPA
      # --------------------------------------------------
      - name: 🔍 Verify IPA Contents
        run: |
          echo "=== IPA File ==="
          ls -lh ${{ env.IPA_DIR }}/*.ipa
          echo ""
          echo "=== Checking IPA Contents ==="
          unzip -l ${{ env.IPA_DIR }}/*.ipa | grep -E "(App.framework|Flutter.framework)" | head -10

      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IPA_DIR }}/*.ipa

      - name: 📤 Upload dSYM for Crash Analysis
        uses: actions/upload-artifact@v4
        with:
          name: ios-dsym
          path: ${{ env.ARCHIVE_DIR }}/Runner.xcarchive/dSYMs/

      - name: 📤 Upload Logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            archive.log
            export.log

  # ======================================================
  # DEPLOYMENT JOB
  # ======================================================
  ios-deploy:
    name: 🚀 Deploy to TestFlight
    needs: ios-ci
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa

      - name: 🚀 Install Fastlane
        run: sudo gem install fastlane -N

      - name: 🔐 Write api_key.json
        run: echo '${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BUILD }}' > api_key.json

      - name: 🚀 Upload to TestFlight
        run: |
          fastlane pilot upload \
            --api_key_path api_key.json \
            --ipa build/ios/ipa/*.ipa \
            --skip_waiting_for_build_processing

      - name: 📋 Generate Crash Report Instructions
        run: |
          cat > TestFlightDebugInstructions.md <<'INSTRUCTIONS'
          # How to Get iOS Crash Logs from TestFlight
          
          ## On the Test Device:
          1. Install app from TestFlight
          2. Launch the app (if it shows black screen and crashes)
          3. Go to Settings → Privacy & Security → Analytics & Improvements → Analytics Data
          4. Look for crash logs starting with "saoirse_app-" or "Runner-"
          5. Tap the log → Share button → Send to yourself
          
          ## Alternative - Using Xcode:
          1. Connect device to Mac via USB
          2. Open Xcode → Window → Devices and Simulators
          3. Select your device
          4. Click "View Device Logs"
          5. Filter for "saoirse" or look for recent crashes
          INSTRUCTIONS
          
          echo "✅ Debug instructions created"
