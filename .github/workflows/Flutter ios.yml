name: 🍎 iOS CI & TestFlight
run-name: "🚀 iOS Build by ${{ github.actor }} on ${{ github.ref_name }}"

on:
  push:
    branches:
      - DEPLOY

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  BUNDLE_ID: com.saoirse.epi
  TEAM_ID: BYQUNNQSQH
  PROFILE_NAME: "match AppStore com.saoirse.epi 1765456537"
  ARCHIVE_DIR: build/ios/archive
  IPA_DIR: build/ios/ipa


jobs:
  ios-ci:
    runs-on: macos-15
    outputs:
      version_name: ${{ steps.version.outputs.VERSION_NAME }}
      build_number: ${{ steps.version.outputs.BUILD_NUMBER }}

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Xcode preparation
      # --------------------------------------------------
      - name: 🛠 Prepare Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -runFirstLaunch || true

      # --------------------------------------------------
      # Flutter
      # --------------------------------------------------
      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # --------------------------------------------------
      # Ruby tools
      # --------------------------------------------------
      - name: 🚀 Install Fastlane & CocoaPods
        run: |
          sudo gem install fastlane -N
          sudo gem install cocoapods -N

      # --------------------------------------------------
      # Clean
      # --------------------------------------------------
      - name: 🧹 Flutter Clean
        run: flutter clean

      # --------------------------------------------------
      # Dependencies
      # --------------------------------------------------
      - name: 📦 Flutter Pub Get
        run: flutter pub get

      # --------------------------------------------------
      # Version
      # --------------------------------------------------
      - name: 🔢 Read Version from pubspec.yaml
        id: version
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | cut -d '+' -f 1 | sed 's/version: //')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | cut -d '+' -f 2)

          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER=$GITHUB_RUN_NUMBER
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          
          echo "Building version: $VERSION_NAME ($BUILD_NUMBER)"

      # --------------------------------------------------
      # ENV
      # --------------------------------------------------
      - name: 🔑 Create .env file
        run: |
          cat > .env <<EOF
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          IOS_API_KEY=${{ secrets.IOS_API_KEY }}
          IOS_APP_ID=${{ secrets.IOS_APP_ID }}
          IOS_MESSAGING_SENDER_ID=${{ secrets.IOS_MESSAGING_SENDER_ID }}
          IOS_PROJECT_ID=${{ secrets.IOS_PROJECT_ID }}
          ANDROID_API_KEY=${{ secrets.ANDROID_API_KEY }}
          ANDROID_APP_ID=${{ secrets.ANDROID_APP_ID }}
          ANDROID_MESSAGING_SENDER_ID=${{ secrets.ANDROID_MESSAGING_SENDER_ID }}
          ANDROID_PROJECT_ID=${{ secrets.ANDROID_PROJECT_ID }}
          EOF

      # --------------------------------------------------
      # App Store Connect API key
      # --------------------------------------------------
      - name: 🔐 Write App Store Connect API Key
        run: |
          mkdir -p ios
          echo '${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BUILD }}' > ios/api_key.json
          chmod 600 ios/api_key.json

      # --------------------------------------------------
      # Keychain
      # --------------------------------------------------
      - name: 🔓 Setup Keychain
        run: |
          KEYCHAIN_PASSWORD="ci_keychain_pass"
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          
          # Delete if exists
          security delete-keychain build.keychain-db 2>/dev/null || true
          
          # Create new keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          
          # Set as default
          security default-keychain -s build.keychain-db
          
          # Unlock
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          
          # Set timeout to 2 hours
          security set-keychain-settings -lut 7200 build.keychain-db
          
          # Add to search list
          security list-keychains -d user -s build.keychain-db $(security list-keychains -d user | sed s/\"//g)
          
          echo "✅ Keychain setup complete"
          security list-keychains

      # --------------------------------------------------
      # Certificates
      # --------------------------------------------------
      - name: 🔐 Fastlane Match
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          fastlane match appstore \
            --readonly \
            --api_key_path ./api_key.json \
            --git_url https://github.com/nabeelanasaritsaoirse/ios-certificates.git \
            --git_branch main \
            --keychain_name build.keychain-db \
            --keychain_password "ci_keychain_pass"
                echo "✅ Certificates installed"
                
          # Verify certificates
          echo "Checking for Apple Distribution certificate..."
          security find-identity -v -p codesigning build.keychain-db | grep "Apple Distribution" || echo "⚠️ No distribution cert found!"

      # --------------------------------------------------
      # Firebase Config
      # --------------------------------------------------
      - name: 🔥 Add GoogleService-Info.plist
        run: |
          cat > ios/Runner/GoogleService-Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>${{ secrets.IOS_API_KEY }}</string>
            <key>GCM_SENDER_ID</key>
            <string>${{ secrets.IOS_MESSAGING_SENDER_ID }}</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>com.saoirse.epi</string>
            <key>PROJECT_ID</key>
            <string>${{ secrets.IOS_PROJECT_ID }}</string>
            <key>STORAGE_BUCKET</key>
            <string>saoirse-epi.firebasestorage.app</string>
            <key>IS_ADS_ENABLED</key>
            <false></false>
            <key>IS_ANALYTICS_ENABLED</key>
            <false></false>
            <key>IS_APPINVITE_ENABLED</key>
            <true></true>
            <key>IS_GCM_ENABLED</key>
            <true></true>
            <key>IS_SIGNIN_ENABLED</key>
            <true></true>
            <key>GOOGLE_APP_ID</key>
            <string>${{ secrets.IOS_APP_ID }}</string>
            <key>CLIENT_ID</key>
            <string>486829564070-c6hh2o5qd20omheki4qlkkhhg4u4625q.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>com.googleusercontent.apps.486829564070-c6hh2o5qd20omheki4qlkkhhg4u4625q</string>
            <key>ANDROID_CLIENT_ID</key>
            <string>486829564070-4d1fkup9ndsfec17mg830p1p7eqd6469.apps.googleusercontent.com</string>
          </dict>
          </plist>
          EOF

      # --------------------------------------------------
      # Pods
      # --------------------------------------------------
      - name: 📦 Install Pods
        run: |
          cd ios
          pod install --repo-update

      # --------------------------------------------------
      # Configure Xcode project for manual signing
      # --------------------------------------------------
      - name: ⚙️ Configure Xcode Project Signing
        run: |
          # Install xcodeproj gem to modify project settings
          sudo gem install xcodeproj -N
          
          # Create Ruby script to update project settings
          cat > update_signing.rb <<'RUBY'
          require 'xcodeproj'
          
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          project.targets.each do |target|
            if target.name == 'Runner'
              target.build_configurations.each do |config|
                if config.name == 'Release'
                  config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                  config.build_settings['DEVELOPMENT_TEAM'] = ENV['TEAM_ID']
                  config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                  config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ENV['PROFILE_NAME']
                  config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                end
              end
            end
          end
          
          project.save
          puts "✅ Xcode project configured for manual signing"
          RUBY
          
          ruby update_signing.rb

      # --------------------------------------------------
      # Build Flutter (without codesigning)
      # --------------------------------------------------
      - name: 🔨 Build Flutter Framework
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name ${{ steps.version.outputs.VERSION_NAME }} \
            --build-number ${{ steps.version.outputs.BUILD_NUMBER }}

      # --------------------------------------------------
      # ExportOptions
      # --------------------------------------------------
      - name: 📝 Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
           "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${{ env.PROFILE_NAME }}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      # --------------------------------------------------
      # Archive with Xcode
      # --------------------------------------------------
      - name: 🏗️ Archive with Xcode
        run: |
          cd ios
          mkdir -p ../${{ env.ARCHIVE_DIR }}
          mkdir -p ../${{ env.IPA_DIR }}
          
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../${{ env.ARCHIVE_DIR }}/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM=${{ env.TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db" \
            | tee ../archive.log
          
          echo "✅ Archive created"

      # --------------------------------------------------
      # Verify Archive
      # --------------------------------------------------
      - name: 🔍 Verify Archive
        run: |
          echo "=== Archive Structure ==="
          ls -la ${{ env.ARCHIVE_DIR }}/Runner.xcarchive/Products/Applications/
          
          echo "=== App Contents ==="
          ls -la ${{ env.ARCHIVE_DIR }}/Runner.xcarchive/Products/Applications/Runner.app/
          
          echo "=== Flutter Frameworks ==="
          ls -la ${{ env.ARCHIVE_DIR }}/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/ | grep -E "(App.framework|Flutter.framework)" || echo "⚠️ Flutter frameworks missing!"

      # --------------------------------------------------
      # Export IPA
      # --------------------------------------------------
      - name: 📦 Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath ../${{ env.ARCHIVE_DIR }}/Runner.xcarchive \
            -exportPath ../${{ env.IPA_DIR }} \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            | tee ../export.log
          
          echo "✅ IPA exported"
          ls -lh ../${{ env.IPA_DIR }}/

      # --------------------------------------------------
      # Verify IPA
      # --------------------------------------------------
      - name: 🔍 Verify IPA Contents
        run: |
          echo "=== IPA File ==="
          ls -lh ${{ env.IPA_DIR }}/*.ipa
          
          echo "=== Checking IPA Contents ==="
          unzip -l ${{ env.IPA_DIR }}/*.ipa | grep -E "(App.framework|Flutter.framework)" || echo "⚠️ Flutter frameworks not in IPA!"

      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IPA_DIR }}/*.ipa
          
      - name: 📤 Upload Logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            archive.log
            export.log
  ios-deploy:
    name: 🚀 Deploy to TestFlight
    needs: ios-ci
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa

      - name: 🚀 Install Fastlane
        run: sudo gem install fastlane -N

      - name: 🔐 Write api_key.json
        run: echo '${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BUILD }}' > api_key.json

      - name: 🚀 Upload to TestFlight
        run: |
          fastlane pilot upload \
            --api_key_path api_key.json \
            --ipa build/ios/ipa/*.ipa \
            --skip_waiting_for_build_processing
