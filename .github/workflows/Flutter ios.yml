name: 🍎 iOS Native Debug (Black Screen)
on:
  push:
    branches:
      - DEPLOY
jobs:
  ios-native-debug:
    runs-on: macos-15
    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
      
      # --------------------------------------------------
      # Flutter
      # --------------------------------------------------
      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true
      
      # --------------------------------------------------
      # Flutter clean
      # --------------------------------------------------
      - name: 🧹 Flutter clean
        run: flutter clean
      
      # --------------------------------------------------
      # Pub get (MUST be before pod install)
      # --------------------------------------------------
      - name: 📦 Flutter pub get
        run: flutter pub get
      
      # --------------------------------------------------
      # Configure Swift 6 (FIXES FIREBASE COMPILATION)
      # --------------------------------------------------
      - name: ⚡ Configure Swift 6 for Firebase
        run: |
          echo "Configuring Swift 6 in Podfile..."
          
          # Add Swift 6 post_install hook to Podfile
          cat >> ios/Podfile <<'PODFILE_EOF'
          
          # Swift 6 Configuration (Required for Firebase)
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                # Enable Swift 6
                config.build_settings['SWIFT_VERSION'] = '6.0'
                
                # iOS deployment target
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                
                # Enable Swift concurrency
                config.build_settings['SWIFT_EMIT_ASYNC_WHEN_SUPPORTED'] = 'YES'
              end
            end
          end
          PODFILE_EOF
          
          echo "✅ Swift 6 configured in Podfile"
          cat ios/Podfile
      
      # --------------------------------------------------
      # CocoaPods (NOW it will work with Swift 6)
      # --------------------------------------------------
      - name: 📦 Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..
      
      # --------------------------------------------------
      # Generate iOS config files
      # --------------------------------------------------
      - name: 🛠️ Generate iOS build files
        run: flutter build ios --debug --simulator --no-codesign
      
      # --------------------------------------------------
      # Native Xcode build (to expose crash)
      # --------------------------------------------------
      - name: 🔍 Native Xcode build (verbose)
        run: |
          set -o pipefail
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log
      
      # --------------------------------------------------
      # Upload logs
      # --------------------------------------------------
      - name: 📄 Upload native logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-debug-logs
          path: |
            ios/xcodebuild.log
            ~/Library/Logs/DiagnosticReports
