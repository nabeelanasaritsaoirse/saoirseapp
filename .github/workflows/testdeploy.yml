name: iOS Test Deployment

on:
  push:
    branches:
      - nabeela
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
    # -------------------- CHECKOUT --------------------
    - name: Checkout main repository
      uses: actions/checkout@v4
      with:
        path: main-repo

    - name: Checkout certificates repository (Match repo)
      uses: actions/checkout@v4
      with:
        repository: nabeelanasaritsaoirse/ios-certificates
        ref: master
        path: certificates

    # -------------------- XCODE ------------------------
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    # -------------------- FLUTTER INSTALL ----------------
    - name: 🧩 Install Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'

    # -------------------- FASTLANE MATCH ----------------
    - name: 🔐 Create App Store Connect API Key
      run: echo "${{ secrets.APP_STORE_CONNECT_API_KEY_JSON_BUILD }}" > api_key.json

    - name: 🔐 Install Certificates with Fastlane Match
      id: signing
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        fastlane match appstore \
          --readonly \
          --verbose \
          --api_key_path api_key.json \
          --git_url https://github.com/nabeelanasaritsaoirse/ios-certificates.git \
          --git_branch master \
          --app_identifier com.saoirse.epi

        PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
        PROFILE_UUID=$(basename "$PROFILE_PATH" .mobileprovision)

        CERT_NAME=$(security find-identity -v -p codesigning | head -1 | awk -F\" '{print $2}')

        echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
        echo "signing_identity=$CERT_NAME" >> $GITHUB_OUTPUT

    # -------------------- EXPORTOPTIONS -----------------
    - name: 📝 Create ExportOptions.plist
      run: |
        cat > main-repo/ios/ExportOptions.plist <<'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>BYQUNNQSQH</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.saoirse.epi</key>
                <string>match AppStore com.saoirse.epi</string>
            </dict>
        </dict>
        </plist>
        EOF

    # -------------------- PREPARE FLUTTER ----------------
    - name: 🔧 Prepare Flutter iOS
      working-directory: main-repo
      run: |
        flutter pub get
        flutter build ios --release --no-codesign

    # -------------------- COCOAPODS ---------------------
    - name: Install CocoaPods dependencies
      working-directory: main-repo/ios
      run: pod install

    # -------------------- BUILD -------------------------
    - name: 🏗️ Build iOS App (Archive)
      working-directory: main-repo/ios
      env:
        SIGNING_CERT: ${{ steps.signing.outputs.signing_identity }}
        PROFILE_UUID: ${{ steps.signing.outputs.profile_uuid }}
      run: |
        xcodebuild archive \
          -workspace Runner.xcworkspace \
          -scheme Runner \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $RUNNER_TEMP/Runner.xcarchive \
          DEVELOPMENT_TEAM=BYQUNNQSQH \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="$SIGNING_CERT" \
          PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
          COMPILER_INDEX_STORE_ENABLE=NO

    # -------------------- EXPORT IPA --------------------
    - name: 📦 Export IPA
      working-directory: main-repo/ios
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/Runner.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath $RUNNER_TEMP/build

    # -------------------- TESTFLIGHT UPLOAD -------------
    - name: 🚀 Upload to TestFlight
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY_JSON: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON }}
      run: |
        echo "$APP_STORE_CONNECT_API_KEY_JSON" > $RUNNER_TEMP/AuthKey.p8

        xcrun altool --upload-app \
          --type ios \
          --file $RUNNER_TEMP/build/Runner.ipa \
          --apiKey $APP_STORE_CONNECT_API_KEY_ID \
          --apiIssuer $APP_STORE_CONNECT_ISSUER_ID \
          --apiKeyPath $RUNNER_TEMP/AuthKey.p8

    # -------------------- ARTIFACT -----------------------
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-${{ github.sha }}
        path: ${{ runner.temp }}/build/*.ipa
        retention-days: 30

    # -------------------- CLEANUP ------------------------
    - name: Clean up keychain
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
