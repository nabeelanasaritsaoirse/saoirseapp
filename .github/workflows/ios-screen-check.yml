name: 🍎 iOS Native Debug

on:
  push:
    branches:
      - tes

jobs:
  ios-native-debug:
    runs-on: macos-15

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Flutter
      # --------------------------------------------------
      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      # --------------------------------------------------
      # Flutter clean
      # --------------------------------------------------
      - name: 🧹 Flutter clean
        run: flutter clean

      # --------------------------------------------------
      # Pub get (Creates Generated.xcconfig)
      # --------------------------------------------------
      - name: 📦 Flutter pub get
        run: flutter pub get

      # --------------------------------------------------
      # Create .env file (Required by pubspec.yaml)
      # --------------------------------------------------
      - name: 📝 Create .env file
        run: |
          echo "Creating .env file..."
          touch .env
          echo "# Environment variables" > .env
          echo "✅ .env file created"

      # --------------------------------------------------
      # Download Poppins Fonts (Required)
      # --------------------------------------------------
      - name: 📥 Download Poppins Fonts
        run: |
          echo "Downloading Poppins fonts..."
          mkdir -p assets/fonts
          cd assets/fonts
          
          curl -L -o Poppins-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Regular.ttf"
          curl -L -o Poppins-Medium.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Medium.ttf"
          curl -L -o Poppins-SemiBold.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-SemiBold.ttf"
          curl -L -o Poppins-Bold.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf"
          
          echo "✅ Fonts downloaded:"
          ls -lh
          cd ../..

      # --------------------------------------------------
      # CocoaPods (Install BEFORE building)
      # Podfile already has Swift 5.0 configured
      # --------------------------------------------------
      - name: 📦 Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      # --------------------------------------------------
      # Build iOS Debug (After pods are installed)
      # --------------------------------------------------
      - name: 🛠️ Build iOS Debug
        run: flutter build ios --debug --simulator --no-codesign

      # --------------------------------------------------
      # Native Xcode build (Verification)
      # --------------------------------------------------
      - name: 🔍 Native Xcode build (verbose)
        run: |
          set -o pipefail
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      # --------------------------------------------------
      # Upload logs
      # --------------------------------------------------
      - name: 📄 Upload native logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-debug-logs
          path: |
            ios/xcodebuild.log
