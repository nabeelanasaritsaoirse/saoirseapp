name: saoirse_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.4.17+124

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  android_intent_plus: ^6.0.0
  app_links: ^6.4.1
  appsflyer_sdk: ^6.17.7+1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  change_app_package_name: ^1.5.0
  connectivity_plus: ^7.0.0
  country_phone_validator: ^1.0.2
  country_picker: ^2.0.27
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_gen: ^5.12.0
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^19.5.0
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.2
  fluttertoast: ^8.2.14
  get: ^4.7.2
  get_storage: ^2.1.1
  google_fonts: ^6.3.2
  google_sign_in: ^7.2.0
  http: ^1.5.0
  http_parser: ^4.1.2
  iconsax: ^0.0.8
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  lottie: ^3.3.2
  lucide_icons: ^0.257.0
  mime: ^2.0.0
  mobile_scanner: ^7.1.3
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  razorpay_flutter: ^1.4.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.10.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.11.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/logo/
    - assets/lottie/
    - assets/fonts/
    - .env

  # 🔥 CRITICAL: Bundle Poppins fonts locally for iOS
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
